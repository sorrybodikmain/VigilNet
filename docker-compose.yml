version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CAMTRACK  docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Python backend: FastAPI + YOLOv8 GPU + ONVIF PTZ ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: camtrack_backend
    restart: unless-stopped

    env_file: .env

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility

    ports:
      - "${BACKEND_PORT:-8765}:8765"

    volumes:
      - ./config:/app/config
      - camtrack_models:/app/models

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # час на завантаження YOLO моделі

  # ── React frontend: Vite build → Nginx ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: camtrack_frontend
    restart: unless-stopped

    env_file: .env

    ports:
      - "${FRONTEND_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy

    # frontend на bridge, бо йому не треба бачити камери напряму
    # (він тільки проксює через Nginx до backend)

volumes:
  camtrack_models:
    driver: local
