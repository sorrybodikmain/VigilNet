version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CAMTRACK  docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL — зберігає конфіг камер ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: camtrack_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:-camtrack}
      POSTGRES_USER: ${DB_USER:-camtrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-camtrack}

    volumes:
      - camtrack_db:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-camtrack} -d ${DB_NAME:-camtrack}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python backend: FastAPI + YOLOv8 GPU + ONVIF PTZ ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: camtrack_backend
    restart: unless-stopped

    env_file: .env

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility

    ports:
      - "${BACKEND_PORT:-8765}:8765"

    volumes:
      - camtrack_models:/app/models

    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── pgAdmin 4 — веб-інтерфейс до PostgreSQL ──────────────────────────────
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: camtrack_pgadmin
  #   restart: unless-stopped

  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
  #     PGADMIN_CONFIG_SERVER_MODE: "False"
  #     PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

  #   ports:
  #     - "${PGADMIN_PORT:-5050}:80"

  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  #   volumes:
  #     - camtrack_pgadmin:/var/lib/pgadmin

  # ── React frontend: Vite build → Nginx ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: camtrack_frontend
    restart: unless-stopped

    env_file: .env

    ports:
      - "${FRONTEND_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy

volumes:
  camtrack_db:
    driver: local
  camtrack_models:
    driver: local
  # camtrack_pgadmin:
  #   driver: local
